<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الصفحة غير موجودة — AQ Dev</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: #0A0E1A; color: #F0F4FF;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 24px;
    }
    .num { font-size: 7rem; font-weight: 900; color: #FFB300; line-height: 1; }
    h1 { font-size: 1.5rem; margin: 16px 0 8px; }
    p { color: #8A95B0; margin-bottom: 28px; }
    a {
      display: inline-block; padding: 12px 28px; border-radius: 10px;
      background: #FFB300; color: #0A0E1A; font-weight: 700; text-decoration: none;
    }
  </style>
  <!-- إعادة توجيه تلقائية لـ GitHub Pages مع حفظ المسار -->
  <script>
    // حفظ الرابط الأصلي في sessionStorage لاستعادته في index.html
    const path = window.location.pathname + window.location.search;
    sessionStorage.setItem('redirect', path);
    setTimeout(() => { window.location.href = '/'; }, 0);
  </script>
</head>
<body>
  <div>
    <div class="num">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>جاري التحويل للصفحة الرئيسية...</p>
    <a href="/">العودة للرئيسية</a>
  </div>
</body>
</html>
